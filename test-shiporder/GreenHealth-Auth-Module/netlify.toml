# netlify.toml - 統一設定所有部署環境，靜態網站 + Functions 架構

# [build] 區塊是全局設定，會應用於 main 分支和所有未特殊指定的分支
[build]
  command = "echo 'No build needed'"   # 告訴 Netlify 不需要執行 npm build 等
  publish = "/"                        # 【全局設定】預設發布目錄為根目錄 (適用於 main 分支)
  functions = "netlify/functions"      # Lambda 函式所在目錄

# 【分支特定設定】
# 這裡我們為 test_shiporder 分支建立一個獨立的部署上下文
# 這一段的設定會「覆蓋」上面的全局設定
[context.test_shiporder]
  # 告訴 Netlify，當且僅當部署 "test_shiporder" 分支時，
  # 發布目錄是 "GreenHealth-Auth-Module"
  publish = "GreenHealth-Auth-Module"


# 您現有的其他設定保持不變
[[redirects]]
  from = "/GreenHealth-Auth-Module/config.js"
  to = "/404.html"
  status = 404

[dev]
  framework = "#static"
  publish = "."

# 以下為選用設定，部署時可依需求啟用環境變數
# [context.production.environment]
#   SUPABASE_URL = "https://your-project.supabase.co"
#   SUPABASE_ANON_KEY = "your-anon-key"