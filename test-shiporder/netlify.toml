# ==============================================================================
# Green Health Netlify 设定档 (強制覆蓋版)
# ==============================================================================
#
# 此版本旨在強制覆蓋 Netlify UI 自動填入的 Publish directory 設定。
#
# ==============================================================================

# [build] 區塊將直接覆蓋 UI 上的 Build settings。
[build]
  command = "echo '无需建置指令'"
  # 【最終核心修正】將發布目錄設定為 "." (當前目錄)。
  # 這句話會強制告訴 Netlify：「忽略你在 UI 上看到的 Publish directory，
  # 請直接發布我所在的 Base directory (即 test-shiporder) 的所有內容。」
  publish = "."

# ==============================================================================
# [[redirects]] 區塊定義了重定向與重寫規則。
# 由於 publish = "."，所有 "to" 路徑都將相對於 Base directory (test-shiporder)。
# ==============================================================================

# 規則 1: 處理倉庫後台 (/warehouse-panel/) 的請求
[[redirects]]
  from = "/warehouse-panel/*"
  to = "/warehouse-panel/:splat"
  status = 200

# 規則 2: 處理消費者前端 (GreenHealth-Auth-Module) 的請求
[[redirects]]
  from = "/*"
  to = "/GreenHealth-Auth-Module/:splat"
  status = 200

# ==============================================================================
# ⚙️ 本地开发环境设定
# ==============================================================================
[dev]
  framework = "#static"
  publish = "."
  
# ==============================================================================
# 🔑 环境变数设定
# ==============================================================================
[context.production.environment]
  SUPABASE_URL = "https://your-project.supabase.co"
  SUPABASE_ANON_KEY = "https://your-project.supabase.co"