<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出貨儀表板 - Green Health</title>
    <link rel="stylesheet" href="/warehouse-panel/css/warehouse-style.css" />
  </head>
  <body id="shipping-dashboard">
    <header class="main-header">
      <div class="header-left">
        <a href="/admin/launcher.html" class="back-to-launcher" title="返回應用程式啟動台">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24" /* 【v3.1 核心修正】補上 viewBox 缺少的第四個參數 */
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <h1>出貨管理儀表板</h1>
      </div>
      <div class="header-actions">
        <a href="/warehouse-panel/user-management.html" id="user-management-link" class="btn-secondary hidden"
          >使用者管理</a
        >
        <span id="current-user-email"></span>
        <button id="logout-btn">登出</button>
      </div>
    </header>

    <main class="dashboard-container">
      <aside class="order-queue-panel">
        <div class="tabs">
          <button class="tab-link active" data-status-tab="pending_payment">待備貨</button>
          <button class="tab-link" data-status-tab="paid">待出貨</button>
          <button class="tab-link" data-status-tab="cancelled">已取消</button>
          <button class="tab-link" data-status-tab="search">訂單查詢</button>
        </div>
        <div id="order-list-container">
          <div class="loading-spinner">載入中...</div>
        </div>

        <div id="search-form-container" class="hidden">
          <form id="advanced-order-search-form" class="advanced-search-form">
            <div class="form-group">
              <label for="search-status-selector">訂單狀態</label>
              <select id="search-status-selector">
                <option value="">所有狀態</option>
                <option value="shipped">已出貨</option>
                <option value="cancelled">已取消</option>
                <option value="paid">待出貨</option>
                <option value="pending_payment">待備貨</option>
              </select>
            </div>
            <div class="form-group">
              <label for="search-order-number">訂單號碼</label>
              <input type="text" id="search-order-number" placeholder="可輸入部分單號" />
            </div>
            <div class="form-group">
              <label for="search-customer-keyword">顧客資訊</label>
              <input type="text" id="search-customer-keyword" placeholder="姓名 或 Email" />
            </div>
            <div class="form-group">
              <label for="search-start-date">訂單日期 (起)</label>
              <input type="date" id="search-start-date" />
            </div>
            <div class="form-group">
              <label for="search-end-date">訂單日期 (迄)</label>
              <input type="date" id="search-end-date" />
            </div>
            <button type="submit" class="btn-submit">查詢</button>
            <button type="reset" class="btn-secondary">清除條件</button>
          </form>
        </div>
      </aside>

      <section class="order-detail-panel">
        <div id="order-detail-view" class="hidden">
          <h2 id="order-number-title">訂單 #</h2>
          <div id="printable-area">
            <div class="detail-section">
              <h3>
                備貨清單
                <button id="print-btn" class="btn-secondary">列印備貨單</button>
              </h3>
              <div id="picking-list"></div>
            </div>

            <div class="detail-columns">
              <div class="detail-section" id="shipping-address-section">
                <h3>收件資訊</h3>
                <div id="shipping-address"></div>
              </div>
              <div class="detail-section" id="customer-profile-section">
                <h3>顧客輪廓</h3>
                <div id="customer-profile-content"><p class="loading-text">載入中...</p></div>
              </div>
            </div>

            <div class="detail-section">
              <h3>配送資訊</h3>
              <div id="shipping-method-details"></div>
            </div>
            <div class="detail-section">
              <h3>付款狀態</h3>
              <div id="payment-details"></div>
            </div>
            <div id="cancellation-details-section" class="detail-section hidden">
              <h3>取消資訊</h3>
              <div id="cancellation-details"></div>
            </div>
          </div>

          <div id="payment-confirmation-section" class="detail-section action-section hidden">
            <!-- 付款確認作業內容省略 -->
          </div>
          <div id="shipping-action-section" class="detail-section action-section hidden">
            <!-- 出貨作業內容省略 -->
          </div>
          <div id="cancellation-action-section" class="detail-section action-section hidden">
            <!-- 訂單取消作業內容省略 -->
          </div>

          <div id="order-history-section" class="detail-section">
            <details>
              <summary>顯示訂單操作歷史</summary>
              <div id="order-history-content"><p class="loading-text">載入中...</p></div>
            </details>
          </div>
        </div>

        <div id="search-results-container" class="hidden">
          <h3>查詢結果</h3>
          <div id="search-summary-container"></div>
          <div id="search-results-list"></div>
        </div>

        <div id="empty-view">
          <p>請從左側選擇一筆訂單或開始查詢。</p>
        </div>
      </section>
    </main>

    <script type="module" src="/warehouse-panel/js/core/app.js"></script>
  </body>
</html>
