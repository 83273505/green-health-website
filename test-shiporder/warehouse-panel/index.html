<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出貨管理儀表板 - Green Health</title>
    <link rel="stylesheet" href="/warehouse-panel/css/warehouse-style.css" />
    <!-- 
      版本: v46.0
      更新日誌: [REFACTOR: INTEGRATED LOGISTICS]
      1. [核心重構] 移除舊的出貨表單 (`shipping-form`)。
      2. [UI] 新增整合式物流作業區塊 (`logistics-action-section`)，包含 API 建立與手動輸入兩種模式的按鈕。
      3. [UI] 新增物流結果展示區塊 (`logistics-result-section`)，用於顯示已產生的託運單號與貨態查詢按鈕。
      4. [UI] 移植並整合先前已驗證成功的貨態查詢彈出視窗 (Modal) 結構。
    -->
</head>
<body id="shipping-dashboard">
    <header class="main-header">
      <div class="header-left">
        <a href="/admin/launcher.html" class="back-to-launcher" title="返回應用程式啟動台">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <h1>出貨管理儀表板</h1>
      </div>
      <div class="header-actions">
        <a href="/warehouse-panel/user-management.html" id="user-management-link" class="btn-secondary hidden"
          >使用者管理</a
        >
        <span id="current-user-email"></span>
        <button id="logout-btn">登出</button>
      </div>
    </header>

    <main class="dashboard-container">
      <aside class="order-queue-panel">
        <div class="tabs">
          <button class="tab-link active" data-status-tab="pending_payment">待備貨</button>
          <button class="tab-link" data-status-tab="paid">待出貨</button>
          <button class="tab-link" data-status-tab="search">訂單查詢</button>
        </div>
        <div id="order-list-container">
          <div class="loading-spinner">載入中...</div>
        </div>

        <div id="search-form-container" class="hidden">
          <form id="advanced-order-search-form" class="advanced-search-form">
            <div class="form-group">
              <label for="search-status-selector">訂單狀態</label>
              <select id="search-status-selector">
                <option value="">所有狀態</option>
                <option value="shipped">已出貨</option>
                <option value="cancelled">已取消</option>
                <option value="paid">待出貨</option>
                <option value="pending_payment">待備貨</option>
              </select>
            </div>
            <div class="form-group">
              <label for="search-order-number">訂單號碼</label>
              <input type="text" id="search-order-number" placeholder="可輸入部分單號" />
            </div>
            <div class="form-group">
              <label for="search-customer-keyword">顧客資訊</label>
              <input type="text" id="search-customer-keyword" placeholder="姓名 或 Email" />
            </div>
            <div class="form-group">
              <label for="search-start-date">訂單日期 (起)</label>
              <input type="date" id="search-start-date" />
            </div>
            <div class="form-group">
              <label for="search-end-date">訂單日期 (迄)</label>
              <input type="date" id="search-end-date" />
            </div>
            <button type="submit" class="btn-submit">查詢</button>
            <button type="reset" class="btn-secondary">清除條件</button>
          </form>
        </div>
      </aside>

      <section class="order-detail-panel">
        <div id="order-detail-view" class="hidden">
          <h2 id="order-number-title">訂單 #</h2>

          <div id="notification-message" style="display: none;"></div>
          
          <div id="printable-area">
            <div class="detail-section">
              <h3>
                備貨清單
                <button id="print-btn" class="btn-secondary">列印備貨單</button>
              </h3>
              <div id="picking-list"></div>
            </div>

            <div class="detail-columns">
              <div class="detail-section" id="shipping-address-section">
                <h3>收件資訊</h3>
                <div id="shipping-address"></div>
              </div>
              <div class="detail-section" id="customer-profile-section">
                <h3>顧客輪廓</h3>
                <div id="customer-profile-content"><p class="loading-text">載入中...</p></div>
              </div>
            </div>

            <div class="detail-section">
              <h3>配送資訊</h3>
              <div id="shipping-method-details"></div>
            </div>
            <div class="detail-section">
              <h3>付款狀態</h3>
              <div id="payment-details"></div>
            </div>
            <div id="cancellation-details-section" class="detail-section hidden">
              <h3>取消資訊</h3>
              <div id="cancellation-details"></div>
            </div>
          </div>

          <div id="payment-confirmation-section" class="detail-section action-section hidden">
            <h3>付款確認作業</h3>
            <form id="payment-confirmation-form">
                <div class="form-group">
                    <label for="payment-method-selector">最終收款方式</label>
                    <select id="payment-method-selector" required>
                        <option value="銀行轉帳 / ATM">銀行轉帳 / ATM</option>
                        <option value="貨到付款">貨到付款</option>
                        <option value="信用卡付款">信用卡付款</option>
                        <option value="現金">現金</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="payment-reference-input">付款參考 (後五碼或其他說明)</label>
                    <input type="text" id="payment-reference-input">
                </div>
                <button type="submit" class="btn-submit">確認收款</button>
            </form>
          </div>

          <!-- [v46.0] 核心重構：全新的整合式物流作業區塊 -->
          <div id="logistics-action-section" class="detail-section action-section hidden">
            <h3>出貨作業</h3>
            <div id="logistics-options">
                <p>請選擇此訂單的出貨方式：</p>
                <div class="btn-group">
                    <button id="btn-create-tcat-shipment" class="btn-primary">建立黑貓託運單 (API)</button>
                    <button id="btn-manual-entry" class="btn-secondary">手動輸入物流單號</button>
                </div>
            </div>
            <form id="manual-shipping-form" class="hidden">
                <div class="form-group">
                    <label for="carrier-selector">配送服務</label>
                    <select id="carrier-selector" required></select>
                </div>
                <div class="form-group">
                    <label for="tracking-code-input">物流追蹤單號</label>
                    <input type="text" id="tracking-code-input" required>
                </div>
                <button type="submit" id="mark-as-shipped-btn" class="btn-submit">確認出貨</button>
            </form>
          </div>

          <!-- [v46.0] 新增：物流結果展示區塊 -->
          <div id="logistics-result-section" class="detail-section hidden">
            <h3>出貨資訊</h3>
            <p><strong>物流服務：</strong><span id="result-carrier"></span></p>
            <p><strong>追蹤單號：</strong><strong id="result-tracking-code" class="highlight-text"></strong></p>
            <div class="btn-group">
                <button id="btn-query-status" class="btn-secondary">查詢貨態</button>
            </div>
          </div>
          
          <div id="cancellation-action-section" class="detail-section action-section hidden">
            <h3>訂單取消作業</h3>
            <p class="warning-text">注意：取消訂單將會自動回補商品庫存。此操作無法復原。</p>
            <button id="btn-cancel-order" class="btn-danger">取消此訂單</button>
          </div>

          <div id="order-history-section" class="detail-section">
            <details>
              <summary>顯示訂單操作歷史</summary>
              <div id="order-history-content"><p class="loading-text">載入中...</p></div>
            </details>
          </div>
        </div>

        <div id="search-results-container" class="hidden">
          <h3>查詢結果</h3>
          <div id="search-summary-container"></div>
          <div id="search-results-list"></div>
        </div>

        <div id="empty-view">
          <p>請從左側選擇一筆訂單或開始查詢。</p>
        </div>
      </section>
    </main>

    <!-- [v46.0] 新增：貨態查詢 Modal -->
    <div id="status-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">貨態歷程</h3>
                <button id="modal-close-btn" class="modal-close-btn">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- 貨態時間軸將動態插入此處 -->
            </div>
        </div>
    </div>

    <script type="module" src="/warehouse-panel/js/core/app.js"></script>
  </body>
</html>
