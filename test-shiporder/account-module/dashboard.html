<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>會員主頁 - Green Health 綠健</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- 【核心修正】將 JS 路徑指向新的 account-module -->
    <script src="/account-module/js/core/config.js"></script>
    <script type="module" src="/account-module/js/core/app.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; color: #333; }
        .container { position: relative; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; }
        span { font-weight: bold; color: #0056b3; }
        .loading-text { font-size: 1.2rem; color: #555; }
        .action-button { display: block; text-decoration: none; width: 100%; box-sizing: border-box; padding: 0.85rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background-color 0.3s, color 0.3s; margin-top: 1rem; }
        .btn-shop { background-color: #5E8C61; color: white; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1.5rem; margin-top: 0; }
        .btn-shop:hover { background-color: #4a7d4d; }
        .btn-edit-profile { background-color: #6c757d; color: white; }
        .btn-edit-profile:hover { background-color: #5a6268; }
        .btn-manage-address { background-color: #007bff; color: white; }
        .btn-manage-address:hover { background-color: #0069d9; }
        .btn-logout { background-color: #dc3545; color: white; }
        .btn-logout:hover { background-color: #c82333; }
        #notification-message { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: calc(100% - 4rem); padding: 1rem; border-radius: 8px; text-align: center; font-weight: 500; display: none; }
        #notification-message.success { background-color: #e8f5e9; color: #5E8C61; display: block; }
        #notification-message.error { background-color: #fce4e4; color: #D9534F; display: block; }
    </style>
</head>
<body id="dashboard">
    <div id="cart-widget-container" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000;"></div>
    <div class="container">
        <div id="notification-message"></div>
        <div id="loading-view"><p class="loading-text">資料載入中，請稍候...</p></div>
        <div id="dashboard-view" style="display: none;">
            <!-- 【核心修正】將所有連結路徑指向新的模組 -->
            <a href="/storefront-module/products.html" class="action-button btn-shop">前往產品世界</a>
            <h1>歡迎回來, <span id="user-name"></span>!</h1>
            <p>您的 Email 是: <span id="user-email"></span></p>
            <p>您的電話是: <span id="user-phone"></span></p>
            <p>您的生日是: <span id="user-birthday"></span></p>
            <a href="/account-module/profile-edit.html" class="action-button btn-edit-profile">編輯個人資料</a>
            <a href="/account-module/address.html" class="action-button btn-manage-address">管理收貨地址</a>
            <button id="logout-button" class="action-button btn-logout">登出</button>
        </div>
    </div>
</body>
</html>
