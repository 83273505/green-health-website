<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台登入 - Green Health</title>
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- 【核心修正】將 CSS 路徑改為從網站根目錄開始的絕對路徑 -->
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body id="admin-login">

    <div class="login-container">
        <div class="login-box">
            <h1>Green Health</h1>
            <p>管理後台系統</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <div id="notification-message"></div>

                <button type="submit" class="btn-submit">登入</button>
            </form>
        </div>
    </div>

    <!-- 
      核心腳本載入
      1. 載入共用的 config.js 來設定 Supabase 金鑰。
      2. 載入 admin 模組的 app.js 作為主應用程式入口。
      路徑皆為從網站根目錄開始的絕對路徑，以確保路由的穩定性。
    -->
    <script src="/_shared/js/config.js"></script>
    <script type="module" src="/admin/js/core/app.js"></script>
</body>
</html>
