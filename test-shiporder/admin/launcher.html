<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用程式啟動台 - Green Health</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body id="admin-launcher">

    <header class="page-header">
        <h1>Green Health 管理後台</h1>
        <div class="header-actions">
            <span id="current-user-email"></span>
            <button id="logout-btn">登出</button>
        </div>
    </header>

    <main class="launcher-container">
        <!-- 
          這個容器是動態內容的進入點。
          launcher.js 會根據使用者權限，在這裡渲染對應的模組卡片。
        -->
        <div id="launcher-content">
            <div class="loading-container">
                <p>正在載入您的應用程式清單...</p>
            </div>
        </div>
    </main>
    
    <!-- 【核心修正】移除对 config.js 的引用 -->
    <script type="module" src="/admin/js/core/app.js"></script>
</body>
</html>
