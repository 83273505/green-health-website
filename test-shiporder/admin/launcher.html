<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用程式啟動台 - Green Health</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- 【核心修正】將 CSS 路徑改為從網站根目錄開始的絕對路徑 -->
    <link rel="stylesheet" href="/admin/css/admin-style.css">
</head>

<body id="admin-launcher">

    <header class="page-header">
        <h1>Green Health 管理後台</h1>
        <div class="header-actions">
            <span id="current-user-email"></span>
            <button id="logout-btn">登出</button>
        </div>
    </header>

    <main class="launcher-container">
        <!-- 
          這個容器是動態內容的進入點。
          JavaScript 會根據使用者權限，在這裡渲染對應的模組卡片。
        -->
        <div id="launcher-content">
            <div class="loading-container">
                <p>正在載入您的應用程式清單...</p>
            </div>
        </div>
    </main>
    
    <!-- 
      核心腳本載入
      1. 載入共用的 config.js 來設定 Supabase 金鑰。
      2. 載入 admin 模組的 app.js 作為主應用程式入口。
      路徑皆為從網站根目錄開始的絕對路徑，以確保路由的穩定性。
    -->
    <script src="/_shared/js/config.js"></script>
    <script type="module" src="/admin/js/core/app.js"></script>
</body>
</html>
