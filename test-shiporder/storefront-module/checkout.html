<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>結帳 - Green Health 綠健</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <script type="module" src="/storefront-module/js/core/app.js"></script>
    <style>
        :root { --primary-color: #5E8C61; --border-color: #ddd; --text-color: #333; --background-color: #f4f7f6; --google-color: #4285F4; --line-color: #06C755;}
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 1rem; box-sizing: border-box; }
        .checkout-container { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; max-width: 1200px; margin: 2rem auto; }
        @media (max-width: 992px) {
            .checkout-container { grid-template-columns: 1fr; margin: 1rem auto; gap: 1.5rem; }
            .order-summary { order: -1; }
            body { padding: 1rem; }
        }
        .main-content, .order-summary { background-color: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        @media (min-width: 768px) { .main-content, .order-summary { padding: 2rem; } }
        h1, h2, h3 { color: #222; border-bottom: 1px solid #eee; padding-bottom: 0.75rem; margin-top: 0; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; }
        h3 { font-size: 1rem; border-bottom: none; margin-bottom: 0.75rem; }
        .section { margin-bottom: 2rem; }
        .option-list { display: flex; flex-direction: column; gap: 1rem; }
        .option-item { border: 1px solid var(--border-color); border-radius: 6px; padding: 1rem; cursor: pointer; }
        .option-item label { display: flex; align-items: flex-start; cursor: pointer; width: 100%; }
        .payment-details .name { font-weight: bold; }
        .payment-details .description { color: #555; font-size: 0.85rem; margin-top: 0.25rem; }
        .summary-row { display: flex; justify-content: space-between; padding: 0.75rem 0; }
        .summary-row.total { font-size: 1.2rem; font-weight: bold; border-top: 1px solid #eee; margin-top: 0.5rem; }
        .summary-row.discount { color: #D9534F; }
        .summary-item { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem 1rem; font-size: 0.9rem; padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; }
        .summary-item .item-name { grid-column: 1 / 2; }
        .summary-item .item-qty { grid-column: 1 / 2; color: #666; font-size: 0.85rem; }
        .summary-item .item-total { grid-column: 2 / 3; grid-row: 1 / 3; text-align: right; white-space: nowrap; }
        .submit-btn { width: 100%; background-color: #B12704; color: white; border: none; padding: 1rem; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #loading-overlay { position: fixed; inset: 0; background-color: rgba(255, 255, 255, 0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        #notification-message { padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px; text-align: center; font-weight: 500; display: none; }
        .user-welcome-message { padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px; background-color: #e4f0fcec; border: 1px solid var(--primary-color); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; box-sizing: border-box; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; }
        .form-group input:read-only { background-color: #f0f0f0; cursor: not-allowed; }
        .terms-consent-group { display: flex; align-items: flex-start; gap: 0.75rem; margin-top: 1rem; }
        .terms-consent-group label { font-size: 0.85rem; color: #555; line-height: 1.5; }
        .terms-consent-group a { color: var(--primary-color); text-decoration: none; }
        .terms-consent-group input { margin-top: 4px; }
        .hidden { display: none; }
        #address-selector-container { margin-bottom: 1.5rem; }
        .notice { padding: 1rem; background: #eef7ff; border-radius: 8px; color: #0369a1; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .oauth-bar { display: flex; gap: 1rem; }
        .oauth-btn { flex: 1; padding: 0.75rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; color: white; cursor: pointer; text-align: center; }
        .oauth-btn.google { background-color: var(--google-color); }
        .oauth-btn.line { background-color: var(--line-color); }
        .divider { display: flex; align-items: center; text-align: center; color: #aaa; margin: 2rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body id="checkout">
    <div id="loading-overlay">正在準備您的訂單...</div>
    <div class="checkout-container" style="display: none;">
        <aside class="order-summary">
            <h2>訂單摘要</h2>
            <div id="summary-item-list" class="summary-item-list"></div>
            <div id="order-summary-container">
                <div class="summary-row"><span>商品小計</span><span id="summary-subtotal">$0</span></div>
                <div class="summary-row discount" style="display: none;"><span>折扣優惠</span><span id="summary-coupon-discount">-$0</span></div>
                <div class="summary-row"><span>運費</span><span id="summary-shipping-fee">$0</span></div>
                <div class="summary-row total"><span>總計</span><span id="summary-total-price">$0</span></div>
            </div>
            <button id="place-order-btn" class="submit-btn" disabled>確認下單</button>
        </aside>
        <div class="main-content">
            <h1>結帳</h1>
            <div id="notification-message"></div>
            <div id="user-welcome-message" class="user-welcome-message hidden"></div>
            
            <!-- [v38.2 新增] 社交登入區塊，預設顯示，將由 JS 在會員登入後隱藏 -->
            <section id="social-login-section">
                <div class="notice">
                    會員請由此登入，系統將自動帶入您的收件資訊，讓結帳更快速！
                </div>
                <div class="oauth-bar">
                    <button id="btn-login-google" class="oauth-btn google">使用 Google 快速登入</button>
                    <button id="btn-login-line" class="oauth-btn line">使用 LINE 快速登入</button>
                </div>
                <div class="divider">或</div>
            </section>

            <form id="checkout-form" novalidate>
                <div class="section" id="customer-info-section">
                    <h2>1. 顧客與收件資訊</h2>
                    <div id="address-selector-container" class="form-group full-width hidden"></div>
                    <div class="form-grid">
                        <div class="form-group"><label for="recipient_name">收件人姓名</label><input type="text" id="recipient_name" name="recipient_name" required></div>
                        <div class="form-group"><label for="phone_number">手機號碼</label><input type="tel" id="phone_number" name="phone_number" required pattern="09\d{8}" title="請輸入有效的台灣手機號碼 (09開頭，共10碼)"></div>
                    </div>
                    <div class="form-group full-width" style="margin-top: 1rem;">
                        <label for="email">顧客 Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-grid" style="margin-top: 1rem;">
                        <div class="form-group"><label for="city-selector">縣市</label><select id="city-selector" name="city" required><option value="">請選擇縣市</option></select></div>
                        <div class="form-group"><label for="district-selector">鄉鎮市區</label><select id="district-selector" name="district" required><option value="">請先選擇縣市</option></select></div>
                        <div class="form-group"><label>郵遞區號</label><div id="postal-code-display">---</div><input type="hidden" id="postal-code-input" name="postal_code"></div>
                    </div>
                    <div class="form-group full-width" style="margin-top: 1rem;"><label for="street_address">街道地址</label><input type="text" id="street_address" name="street_address" required></div>
                </div>

                <div class="section">
                    <h2>2. 選擇運送與付款方式</h2>
                    <h3>運送方式</h3>
                    <div id="shipping-list-container" class="option-list"><p>正在載入運送方式...</p></div>
                    <div id="payment-method-container" style="margin-top: 2rem;">
                        <h3>付款方式</h3>
                        <div id="payment-list-container" class="option-list"><p>正在載入付款方式...</p></div>
                    </div>
                </div>

                <div class="section" id="invoice-section">
                    <h2>3. 發票資訊</h2>
                    <div id="invoice-type-selector" class="option-list">
                        <div class="option-item"><label><input type="radio" name="invoiceType" value="cloud" checked><div><span class="name">雲端發票</span><p class="description">發票將存入您的載具，中獎時會自動通知您。</p></div></label></div>
                        <div class="option-item"><label><input type="radio" name="invoiceType" value="donation"><div><span class="name">捐贈發票</span><p class="description">發票將代為捐贈給指定的社福團體。</p></div></label></div>
                        <div class="option-item"><label><input type="radio" name="invoiceType" value="business"><div><span class="name">公司戶發票</span><p class="description">發票將開立統一編號，可用於企業報帳。</p></div></label></div>
                    </div>
                    <div id="invoice-details-forms" style="margin-top: 1.5rem;">
                        <div id="form-cloud"><div class="form-group"><label for="carrier-type">載具類型</label><select id="carrier-type"><option value="member" selected>會員載具 (儲存於您的帳戶 Email)</option><option value="mobile">手機條碼</option><option value="certificate">自然人憑證</option></select></div><div class="form-group hidden" id="carrier-number-group"><label for="carrier-number">載具號碼</label><input type="text" id="carrier-number" placeholder="請輸入載具號碼"></div></div>
                        <div id="form-donation" class="hidden"><div class="form-group"><label for="donation-code">捐贈碼</label><input type="text" id="donation-code" placeholder="請輸入愛心碼 (3-7位數字)"></div></div>
                        <div id="form-business" class="hidden"><div class="form-group"><label for="vat-number">統一編號</label><input type="text" id="vat-number" placeholder="請輸入 8 位數字統一編號" maxlength="8"></div><div class="form-group"><label for="company-name">公司抬頭</label><input type="text" id="company-name" placeholder="請輸入公司完整名稱"></div></div>
                    </div>
                </div>
                
                <div class="section" id="terms-consent-section">
                    <div class="terms-consent-group">
                        <input type="checkbox" id="terms-consent-checkout" required checked>
                        <label for="terms-consent-checkout">
                            我已閱讀並同意
                            <a href="/storefront-module/terms.html" target="_blank">《服務條款》</a>與<a href="/storefront-module/terms.html" target="_blank">《隱私權政策》</a>。
                        </label>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
